# =============================================================================
# Model Registry for whisper-wrap v2
# =============================================================================
#
# Required fields:
#   repo_id:      Hugging Face repository ID (e.g. "shdennlin/breeze-asr-25-ct2")
#   format:       Format discriminator. v2 ONLY accepts "ct2" (CTranslate2).
#                 Reserved for future formats — other values are rejected.
#   compute_type: Default compute type for the variant (e.g. "int8_float16").
#                 NOTE: On Apple Silicon CPU, set COMPUTE_TYPE=default in .env so
#                 CT2 auto-picks the runtime path. This field is metadata only.
#   local_dir:    Subdirectory under ./models/ to download into.
#   size:         Approximate disk footprint (informational).
#   languages:    List of supported languages or [multilingual].
#   description:  Brief description.
#
# Optional fields:
#   subfolder:    Subfolder within the HF repo (use when the repo publishes
#                 multiple quantisation variants under one repository).
#   revision:     Commit SHA or branch name for reproducible pins.
#   default:      Exactly one entry SHALL set this to true. `make setup`
#                 downloads the default entry.
#
# To add a custom model, append an entry under "models:" following the format
# below. Models are referenced by their key name (e.g. "large-v3-turbo").
# =============================================================================

models:
  breeze-asr-25:
    default: true
    repo_id: "shdennlin/breeze-asr-25-ct2"
    format: ct2
    subfolder: int8_float16
    compute_type: int8_float16
    local_dir: breeze-asr-25
    size: "1.5GB"
    languages: [zh-TW, en]
    description: "MediaTek Breeze ASR 25 (CTranslate2 int8_float16) — Taiwanese Mandarin + English code-switching"

  large-v3-turbo:
    repo_id: "Systran/faster-whisper-large-v3-turbo"
    format: ct2
    compute_type: int8_float16
    local_dir: large-v3-turbo
    size: "1.6GB"
    languages: [multilingual]
    description: "OpenAI Whisper large-v3-turbo (CTranslate2 int8_float16) — multilingual fallback"
