# =============================================================================
# Model Registry for whisper-wrap v2.1
# =============================================================================
#
# Schema:
#   Each top-level key under `models:` is a kebab-case model identifier with:
#     - `description`: brief human-readable description (required)
#     - `languages`:  list of supported language tags (required)
#     - `variants`:   non-empty list of backend-specific packagings (required)
#     - `size`:       approximate disk footprint summed over installed variants (optional)
#     - `default`:    exactly one entry across the registry SHALL be `true` (optional)
#
#   Each variant in the `variants:` list declares:
#     - `format`:     "ct2" or "ggml" (required)
#     - `local_dir`:  subdirectory under ./models/ (required)
#     - format-specific fields:
#         ct2:   `compute_type` (e.g. "int8_float16")
#         ggml:  `quant` (e.g. "q6_k"), `filename` (.bin name), `coreml_encoder` (.mlmodelc dir)
#     - optional:     `repo_id`, `revision`, `subfolder`, `default_on` (list of
#                     "darwin" / "linux"; controls per-platform default selection
#                     when BACKEND_FORMAT is not set)
#
# Backend selection precedence (see app/services/registry.py):
#   1. MODEL_DIR override → load directly, registry not consulted.
#   2. BACKEND_FORMAT env var → pick variant with matching `format`.
#   3. Otherwise → pick variant whose `default_on` contains the host platform.
#
# To add a custom model, append a top-level entry following the same shape.
# =============================================================================

models:
  breeze-asr-25:
    description: "MediaTek Breeze ASR 25 — Taiwanese Mandarin + English code-switching"
    languages: [zh-TW, en]
    tags: [code-switching]
    license: "See model card (MediaTek Research, Whisper-based)"
    default: true
    recommended: true
    size: "1.5-2.0 GB"
    speed: 6.5
    accuracy: 9.2
    variants:
      - format: ct2
        repo_id: "shdennlin/breeze-asr-25-ct2"
        subfolder: int8_float16
        compute_type: int8_float16
        local_dir: breeze-asr-25-ct2
        default_on: [linux]
      - format: ggml
        repo_id: "shdennlin/breeze-asr-25-ggml"
        quant: q6_k
        filename: ggml-breeze-asr-25-q6_k.bin
        coreml_encoder: ggml-breeze-asr-25-encoder.mlmodelc
        local_dir: breeze-asr-25-ggml
        default_on: [darwin]

  large-v3-turbo:
    description: "OpenAI Whisper large-v3-turbo — multilingual fallback"
    languages: [multilingual]
    tags: [fast]
    license: "MIT (OpenAI Whisper)"
    size: "1.6 GB"
    speed: 8.5
    accuracy: 9.0
    variants:
      - format: ct2
        repo_id: "Systran/faster-whisper-large-v3-turbo"
        compute_type: int8_float16
        local_dir: large-v3-turbo
        default_on: [linux]
      # ggml build so the macOS (whisper.cpp / whisper-rs) backend can run it
      # too — without this it shows "Not supported" on desktop.
      - format: ggml
        repo_id: "ggerganov/whisper.cpp"
        filename: ggml-large-v3-turbo.bin
        local_dir: large-v3-turbo-ggml
        default_on: [darwin]

  # --- OpenAI Whisper ggml builds (ggerganov/whisper.cpp) -------------------
  # Curated speed/accuracy ladder for the picker; all multilingual ggml so the
  # whisper-rs backend runs them on every platform.
  whisper-large-v3:
    description: "OpenAI Whisper large-v3 — highest accuracy, multilingual"
    languages: [multilingual]
    tags: [high-accuracy]
    license: "MIT (OpenAI Whisper)"
    recommended: true
    size: "2.9 GB"
    speed: 5.0
    accuracy: 9.5
    variants:
      - format: ggml
        repo_id: "ggerganov/whisper.cpp"
        filename: ggml-large-v3.bin
        local_dir: whisper-large-v3-ggml
        default_on: [darwin, linux]

  whisper-small:
    description: "OpenAI Whisper small — balanced speed and accuracy, multilingual"
    languages: [multilingual]
    tags: [balanced]
    license: "MIT (OpenAI Whisper)"
    recommended: true
    size: "466 MB"
    speed: 8.0
    accuracy: 7.2
    variants:
      - format: ggml
        repo_id: "ggerganov/whisper.cpp"
        filename: ggml-small.bin
        local_dir: whisper-small-ggml
        default_on: [darwin, linux]

  whisper-base:
    description: "OpenAI Whisper base — fast, multilingual"
    languages: [multilingual]
    tags: [fast]
    license: "MIT (OpenAI Whisper)"
    size: "142 MB"
    speed: 8.8
    accuracy: 7.0
    variants:
      - format: ggml
        repo_id: "ggerganov/whisper.cpp"
        filename: ggml-base.bin
        local_dir: whisper-base-ggml
        default_on: [darwin, linux]

  whisper-tiny:
    description: "OpenAI Whisper tiny — fastest, lowest accuracy, multilingual"
    languages: [multilingual]
    tags: [fast]
    license: "MIT (OpenAI Whisper)"
    size: "75 MB"
    speed: 9.5
    accuracy: 6.0
    variants:
      - format: ggml
        repo_id: "ggerganov/whisper.cpp"
        filename: ggml-tiny.bin
        local_dir: whisper-tiny-ggml
        default_on: [darwin, linux]
