# =============================================================================
# Model Registry for whisper-wrap
# =============================================================================
#
# Each model entry requires:
#   url:         Direct download URL for the GGML model file
#   filename:    Local filename to save as (used by download scripts)
#   size:        Approximate file size (for user reference)
#   languages:   List of supported languages or [multilingual]
#   description: Brief description of the model
#
# Optional fields:
#   default:     Set to true for the model used when none is specified
#
# To add a custom model, append an entry under "models:" following the format
# below. Models are referenced by their key name (e.g. "large-v3-turbo").
# =============================================================================

models:
  large-v3-turbo:
    url: "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-large-v3-turbo.bin"
    filename: "ggml-large-v3-turbo.bin"
    size: "1.6GB"
    languages: [multilingual]
    description: "OpenAI Whisper large-v3-turbo - fast, general purpose"

  large-v3-turbo-q8:
    default: true
    url: "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-large-v3-turbo-q8_0.bin"
    filename: "ggml-large-v3-turbo-q8_0.bin"
    size: "874MB"
    languages: [multilingual]
    description: "OpenAI Whisper large-v3-turbo (8-bit quantized, smaller + faster)"

  breeze-asr-25:
    url: "https://huggingface.co/alan314159/Breeze-ASR-25-whispercpp/resolve/main/ggml-Breeze-ASR-25.bin"
    filename: "ggml-Breeze-ASR-25.bin"
    size: "~3GB"
    languages: [zh-TW, en]
    description: "MediaTek Breeze ASR 25 - Taiwanese Mandarin + English code-switching"

  large-v3:
    url: "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-large-v3.bin"
    filename: "ggml-large-v3.bin"
    size: "3.1GB"
    languages: [multilingual]
    description: "OpenAI Whisper large-v3 - highest accuracy, slower"

  medium:
    url: "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-medium.bin"
    filename: "ggml-medium.bin"
    size: "1.5GB"
    languages: [multilingual]
    description: "OpenAI Whisper medium - balanced speed/accuracy"

  base:
    url: "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.bin"
    filename: "ggml-base.bin"
    size: "148MB"
    languages: [multilingual]
    description: "OpenAI Whisper base - lightweight, fast"
