services:
  whisper-wrap:
    build:
      context: .
      args:
        MODEL_NAME: ${MODEL_NAME:-breeze-asr-25}
    image: whisper-wrap:latest
    container_name: whisper-wrap
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    environment:
      - API_PORT=${API_PORT:-8000}
      - API_HOST=${API_HOST:-0.0.0.0}
      - MODEL_NAME=${MODEL_NAME:-breeze-asr-25}
      # Override the default ./models/<name> resolution when mounting a pre-built model.
      # - MODEL_DIR=/app/models/breeze-asr-25
      - COMPUTE_TYPE=${COMPUTE_TYPE:-default}
      - DEVICE=${DEVICE:-auto}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      # - GEMINI_SYSTEM_PROMPT=
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-200}
      - TEMP_DIR=/tmp/whisper-wrap
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - UPLOAD_TIMEOUT_SECONDS=${UPLOAD_TIMEOUT_SECONDS:-60}
    volumes:
      - whisper-models:/app/models
    # The container hosts a single FastAPI process — let the supervisor recover
    # from process crashes instead of relying on in-app auto-restart.
    restart: unless-stopped

volumes:
  whisper-models:
    driver: local
