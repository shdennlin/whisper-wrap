[[package]]
name = "whisper-wrap"
version = "2.0.0"
source = { editable = "." }
dependencies = [
    { name = "alembic" },
    { name = "fastapi" },
    { name = "faster-whisper" },
    { name = "google-genai" },
    { name = "python-dotenv" },
    { name = "python-magic" },
    { name = "python-multipart" },
    { name = "pywhispercpp", marker = "sys_platform == 'darwin'" },
    { name = "pyyaml" },
    { name = "silero-vad" },
    { name = "sqlalchemy" },
    { name = "uvicorn", extra = ["standard"] },
]

[package.optional-dependencies]
dev = [
    { name = "httpx" },
    { name = "pytest" },
    { name = "pytest-asyncio" },
    { name = "ruff" },
]

[package.dev-dependencies]
dev = [
    { name = "pytest-asyncio" },
    { name = "sounddevice" },
    { name = "websockets" },
]

[package.metadata]
requires-dist = [
    { name = "alembic", specifier = ">=1.13" },
    { name = "fastapi", specifier = ">=0.100.0" },
    { name = "faster-whisper", specifier = ">=1.0.0" },
    { name = "google-genai", specifier = ">=0.3.0" },
    { name = "httpx", marker = "extra == 'dev'", specifier = ">=0.24.0" },
    { name = "pytest", marker = "extra == 'dev'", specifier = ">=7.4.0" },
    { name = "pytest-asyncio", marker = "extra == 'dev'", specifier = ">=0.21.0" },
    { name = "python-dotenv", specifier = ">=1.0.0" },
    { name = "python-magic", specifier = ">=0.4.27" },
    { name = "python-multipart", specifier = ">=0.0.6" },
    { name = "pywhispercpp", marker = "sys_platform == 'darwin'", specifier = ">=1.2,<2.0" },
    { name = "pyyaml", specifier = ">=6.0" },
    { name = "ruff", marker = "extra == 'dev'", specifier = ">=0.0.280" },
    { name = "silero-vad", specifier = ">=5.0,<6.0" },
    { name = "sqlalchemy", specifier = ">=2.0" },
