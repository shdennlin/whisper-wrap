name: frontend-e2e

# Real-browser E2E for the PWA bundle (fe-e2e-playwright). Runs only the
# `mocked` Playwright project — deterministic, no engine/model. The `smoke`
# project (real zero-weights server) is intentionally NOT run here so this
# frontend job stays engine-free.

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-e2e.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-e2e.yml"

jobs:
  e2e-mocked:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run mocked E2E
        run: bun run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
